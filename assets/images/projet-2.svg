<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      .bg { fill: #020d02; }
      .grid-line { stroke: #003a0a; stroke-width: 0.5; }
      .title-text { font-family: 'Share Tech Mono', monospace; fill: #00cc44; font-size: 13px; letter-spacing: 2px; }
      .label-text { font-family: 'Share Tech Mono', monospace; fill: #00aa33; font-size: 11px; letter-spacing: 1px; }
      .small-text { font-family: 'Share Tech Mono', monospace; fill: #008020; font-size: 9px; letter-spacing: 1px; }
      .tag-text   { font-family: 'Share Tech Mono', monospace; fill: #33bb55; font-size: 10px; letter-spacing: 1px; }
      .dim-text   { font-family: 'Share Tech Mono', monospace; fill: #005c10; font-size: 9px; }
      .server-box { fill: #001a00; stroke: #00cc44; stroke-width: 1.5; rx: 4; }
      .ou-box     { fill: #001200; stroke: #00aa33; stroke-width: 1; }
      .pc-box     { fill: #000d00; stroke: #008020; stroke-width: 0.8; }
      .domain-box { fill: none; stroke: #005c10; stroke-width: 1; stroke-dasharray: 4,3; }
      .line-ad    { stroke: #00aa33; stroke-width: 1.2; fill: none; }
      .line-ou    { stroke: #008020; stroke-width: 0.8; fill: none; stroke-dasharray: 3,2; }
      .badge      { fill: #00cc44; font-family: 'Share Tech Mono', monospace; font-size: 8px; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

