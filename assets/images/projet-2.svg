    <line class="grid-line" x1="450" y1="0" x2="450" y2="500"/>
    <line class="grid-line" x1="475" y1="0" x2="475" y2="500"/>
    <line class="grid-line" x1="500" y1="0" x2="500" y2="500"/>
    <line class="grid-line" x1="525" y1="0" x2="525" y2="500"/>
    <line class="grid-line" x1="550" y1="0" x2="550" y2="500"/>
    <line class="grid-line" x1="575" y1="0" x2="575" y2="500"/>
    <line class="grid-line" x1="600" y1="0" x2="600" y2="500"/>
    <line class="grid-line" x1="625" y1="0" x2="625" y2="500"/>
    <line class="grid-line" x1="650" y1="0" x2="650" y2="500"/>
    <line class="grid-line" x1="675" y1="0" x2="675" y2="500"/>
